<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 420" width="920" height="420" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <linearGradient id="hdrGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#007a87"/>
      <stop offset="100%" style="stop-color:#005f69"/>
    </linearGradient>
    <filter id="sh">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#10242d" flood-opacity="0.10"/>
    </filter>
    <marker id="arr" markerWidth="9" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 9 3, 0 6" fill="#007a87"/>
    </marker>
  </defs>

  <!-- bg -->
  <rect width="920" height="420" fill="#f6efe3" rx="12"/>

  <!-- header -->
  <rect x="0" y="0" width="920" height="44" fill="url(#hdrGrad)" rx="12"/>
  <rect x="0" y="32" width="920" height="12" fill="url(#hdrGrad)"/>
  <text x="460" y="28" text-anchor="middle" fill="white" font-size="16" font-weight="700">End-to-End Generation Flow</text>

  <!-- Step boxes — evenly spaced across 920px (30 + 5*(140+14) = 30+770=800, 60px right margin) -->
  <!-- Step 1: x=30 -->
  <rect x="30"  y="80" width="140" height="64" rx="8" fill="white" filter="url(#sh)" stroke="#d5e2e7" stroke-width="1.5"/>
  <text x="100" y="106" text-anchor="middle" fill="#007a87" font-size="22">🧑</text>
  <text x="100" y="124" text-anchor="middle" fill="#10242d" font-size="11" font-weight="600">User Prompt</text>
  <text x="100" y="138" text-anchor="middle" fill="#5b7280" font-size="10">Natural language</text>

  <!-- Step 2: x=224 -->
  <rect x="224" y="80" width="140" height="64" rx="8" fill="white" filter="url(#sh)" stroke="#d5e2e7" stroke-width="1.5"/>
  <text x="294" y="106" text-anchor="middle" fill="#007a87" font-size="22">⚙️</text>
  <text x="294" y="124" text-anchor="middle" fill="#10242d" font-size="11" font-weight="600">Prompt Builder</text>
  <text x="294" y="138" text-anchor="middle" fill="#5b7280" font-size="10">SVG-strict system msg</text>

  <!-- Step 3: x=418 -->
  <rect x="418" y="80" width="140" height="64" rx="8" fill="white" filter="url(#sh)" stroke="#d5e2e7" stroke-width="1.5"/>
  <text x="488" y="106" text-anchor="middle" fill="#007a87" font-size="22">🤖</text>
  <text x="488" y="124" text-anchor="middle" fill="#10242d" font-size="11" font-weight="600">AI Provider</text>
  <text x="488" y="138" text-anchor="middle" fill="#5b7280" font-size="10">Gemini / Ollama</text>

  <!-- Step 4: x=612 -->
  <rect x="612" y="80" width="140" height="64" rx="8" fill="white" filter="url(#sh)" stroke="#d5e2e7" stroke-width="1.5"/>
  <text x="682" y="106" text-anchor="middle" fill="#007a87" font-size="22">🔍</text>
  <text x="682" y="124" text-anchor="middle" fill="#10242d" font-size="11" font-weight="600">SVG Parser</text>
  <text x="682" y="138" text-anchor="middle" fill="#5b7280" font-size="10">Extract fenced block</text>

  <!-- Step 5: x=756 -->
  <rect x="756" y="80" width="140" height="64" rx="8" fill="white" filter="url(#sh)" stroke="#007a87" stroke-width="2"/>
  <text x="826" y="106" text-anchor="middle" fill="#007a87" font-size="22">🖼️</text>
  <text x="826" y="124" text-anchor="middle" fill="#10242d" font-size="11" font-weight="600">SVG Renderer</text>
  <text x="826" y="138" text-anchor="middle" fill="#5b7280" font-size="10">Pan / Zoom / Export</text>

  <!-- Arrows between steps -->
  <line x1="170" y1="112" x2="222" y2="112" stroke="#007a87" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="364" y1="112" x2="416" y2="112" stroke="#007a87" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="558" y1="112" x2="610" y2="112" stroke="#007a87" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="752" y1="112" x2="754" y2="112" stroke="#007a87" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step number circles -->
  <circle cx="100" cy="80" r="12" fill="#007a87"/>
  <text x="100" y="84" text-anchor="middle" fill="white" font-size="11" font-weight="700">1</text>
  <circle cx="294" cy="80" r="12" fill="#007a87"/>
  <text x="294" y="84" text-anchor="middle" fill="white" font-size="11" font-weight="700">2</text>
  <circle cx="488" cy="80" r="12" fill="#007a87"/>
  <text x="488" y="84" text-anchor="middle" fill="white" font-size="11" font-weight="700">3</text>
  <circle cx="682" cy="80" r="12" fill="#007a87"/>
  <text x="682" y="84" text-anchor="middle" fill="white" font-size="11" font-weight="700">4</text>
  <circle cx="826" cy="80" r="12" fill="#005f69"/>
  <text x="826" y="84" text-anchor="middle" fill="white" font-size="11" font-weight="700">5</text>

  <!-- Data contracts section -->
  <rect x="30" y="185" width="860" height="210" rx="10" fill="white" filter="url(#sh)" stroke="#d5e2e7" stroke-width="1.5"/>
  <rect x="30" y="185" width="860" height="32" rx="10" fill="#d8f2f4"/>
  <rect x="30" y="205" width="860" height="12" fill="#d8f2f4"/>
  <text x="460" y="206" text-anchor="middle" fill="#005f69" font-size="12" font-weight="700">Key Data Contracts</text>

  <!-- Contract 1 -->
  <rect x="50"  y="228" width="254" height="152" rx="8" fill="#f6efe3" stroke="#d5e2e7" stroke-width="1"/>
  <text x="177" y="246" text-anchor="middle" fill="#007a87" font-size="11" font-weight="700">generateDiagram() input</text>
  <text x="60"  y="264" fill="#10242d" font-family="'Courier New', monospace" font-size="10">provider: 'gemini' | 'ollama'</text>
  <text x="60"  y="279" fill="#10242d" font-family="'Courier New', monospace" font-size="10">prompt:   string</text>
  <text x="60"  y="294" fill="#10242d" font-family="'Courier New', monospace" font-size="10">model:    string</text>
  <text x="60"  y="309" fill="#10242d" font-family="'Courier New', monospace" font-size="10">baseUrl:  string (Ollama)</text>
  <text x="60"  y="324" fill="#10242d" font-family="'Courier New', monospace" font-size="10">signal:   AbortSignal</text>

  <!-- Contract 2 -->
  <rect x="333" y="228" width="254" height="152" rx="8" fill="#f6efe3" stroke="#d5e2e7" stroke-width="1"/>
  <text x="460" y="246" text-anchor="middle" fill="#007a87" font-size="11" font-weight="700">Result object</text>
  <text x="343" y="264" fill="#10242d" font-family="'Courier New', monospace" font-size="10">ok:          boolean</text>
  <text x="343" y="279" fill="#10242d" font-family="'Courier New', monospace" font-size="10">raw:         string</text>
  <text x="343" y="294" fill="#10242d" font-family="'Courier New', monospace" font-size="10">diagramType: 'svg' | null</text>
  <text x="343" y="309" fill="#10242d" font-family="'Courier New', monospace" font-size="10">error:       { message,</text>
  <text x="343" y="324" fill="#10242d" font-family="'Courier New', monospace" font-size="10">               details }</text>

  <!-- Contract 3 -->
  <rect x="616" y="228" width="254" height="152" rx="8" fill="#f6efe3" stroke="#d5e2e7" stroke-width="1"/>
  <text x="743" y="246" text-anchor="middle" fill="#007a87" font-size="11" font-weight="700">DiagramPayload</text>
  <text x="626" y="264" fill="#10242d" font-family="'Courier New', monospace" font-size="10">type: 'svg'</text>
  <text x="626" y="279" fill="#10242d" font-family="'Courier New', monospace" font-size="10">code: string  // full SVG</text>
  <text x="626" y="306" fill="#5b7280" font-size="10">Passed to SvgRenderer</text>
  <text x="626" y="321" fill="#5b7280" font-size="10">as svgCode prop</text>
</svg>
